{% load i18n static %}
<div class="card bg-base-100 shadow-lg mt-6">
    <div class="card-body p-4 sm:p-6">
        <h3 class="card-title text-lg mb-4 flex items-center gap-2">
            <img src="{% static 'toolbox/icons/file-text.svg' %}"
                 alt="result icon"
                 class="h-6 w-6">
            <span>{% trans "转换结果" %}</span>
        </h3>
        <div class="stats stats-vertical sm:stats-horizontal shadow mb-4">
            <div class="stat place-items-center">
                <div class="stat-title">{% trans "行数" %}</div>
                <div class="stat-value text-2xl">{{ row_count }}</div>
            </div>
            <div class="stat place-items-center">
                <div class="stat-title">{% trans "列数" %}</div>
                <div class="stat-value text-2xl">{{ column_count }}</div>
            </div>
        </div>
        <div class="form-control">
            <label class="label mb-2 justify-between">
                <span class="label-text font-semibold">{% trans "CSV内容" %}</span>
                <button class="btn btn-sm btn-ghost gap-2" onclick="copyCSV()">
                    <svg xmlns="http://www.w3.org/2000/svg"
                         class="h-4 w-4"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                    <span class="text-xs">{% trans "复制" %}</span>
                </button>
            </label>
            <textarea id="csvOutput"
                      class="textarea textarea-bordered w-full h-64 font-mono text-sm"
                      readonly>{{ csv_output }}</textarea>
        </div>
        <div class="flex gap-2 mt-4">
            <button class="btn btn-success flex-1 gap-2" onclick="downloadCSV()">
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="h-5 w-5"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                <span>{% trans "下载CSV文件" %}</span>
            </button>
        </div>
    </div>
</div>
<script>
    function copyCSV() {
        const csvOutput = document.getElementById('csvOutput');
        navigator.clipboard.writeText(csvOutput.value).then(() => {
            showToast('{% trans "已复制到剪贴板" %}', 'success');
        }).catch(err => {
            console.error('复制失败:', err);
            showToast('{% trans "复制失败，请手动复制" %}', 'error');
        });
    }

    function downloadCSV() {
        const csvOutput = document.getElementById('csvOutput');
        const blob = new Blob([csvOutput.value], {
            type: 'text/csv;charset=utf-8;'
        });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', 'output.csv');
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('{% trans "文件下载已开始" %}', 'success');
    }

    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type} toast-center toast-middle z-50`;
        toast.innerHTML = `
        <div class="alert alert-${type}">
            <span>${message}</span>
        </div>
    `;
        document.body.appendChild(toast);

        setTimeout(() => {
            toast.remove();
        }, 3000);
    }
</script>

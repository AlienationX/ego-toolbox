{% load i18n static %}
<div class="card bg-base-100 shadow-lg mt-6">
    <div class="card-body p-4 sm:p-6">
        <h3 class="card-title text-lg mb-4 flex items-center gap-2">
            <img src="{% static 'toolbox/icons/file-text.svg' %}" alt="result icon" class="h-6 w-6">
            <span>{% trans "转换结果" %}</span>
        </h3>
        
        <div class="stats stats-vertical sm:stats-horizontal shadow mb-4">
            <div class="stat place-items-center">
                <div class="stat-title">{% trans "行数" %}</div>
                <div class="stat-value text-2xl">{{ row_count }}</div>
            </div>
            <div class="stat place-items-center">
                <div class="stat-title">{% trans "列数" %}</div>
                <div class="stat-value text-2xl">{{ column_count }}</div>
            </div>
        </div>
        
        <div class="alert alert-info mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>{% trans "Excel文件已生成，请点击下方按钮下载" %}</span>
        </div>
        
        <div class="flex gap-2">
            <button 
                class="btn btn-success flex-1 gap-2"
                onclick="downloadExcel()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                <span>{% trans "下载Excel文件" %}</span>
            </button>
        </div>
    </div>
</div>

<script>
const excelData = "{{ excel_data|escapejs }}";

function downloadExcel() {
    const binaryString = atob(excelData);
    const bytes = new Uint8Array(binaryString.length);
    for (let i = 0; i < binaryString.length; i++) {
        bytes[i] = binaryString.charCodeAt(i);
    }
    
    const blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', 'output.xlsx');
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast('{% trans "文件下载已开始" %}', 'success');
}

function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type} toast-center toast-middle z-50`;
    toast.innerHTML = `
        <div class="alert alert-${type}">
            <span>${message}</span>
        </div>
    `;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.remove();
    }, 3000);
}
</script>
